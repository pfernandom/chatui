<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128">
  <title>go-tui extension icon (light background)</title>
  <!-- Pixel-art "gt" — bold block letters, no shadow.
       g = pink #d42568, t = cyan #2f9eb8
       Uses light-bg palette from go-tui-logo-light-bg.svg -->

  <!-- g main -->
  <g fill="#d42568">
    <rect x="6" y="4" width="9" height="4"/>
    <rect x="1" y="9" width="4" height="4"/>
    <rect x="1" y="14" width="4" height="4"/><rect x="11" y="14" width="4" height="4"/>
    <rect x="1" y="19" width="4" height="4"/><rect x="11" y="19" width="4" height="4"/>
    <rect x="6" y="24" width="9" height="4"/>
  </g>
  <!-- t main -->
  <g fill="#2f9eb8">
    <rect x="17" y="4" width="14" height="4"/>
    <rect x="22" y="9" width="4" height="4"/>
    <rect x="22" y="14" width="4" height="4"/>
    <rect x="22" y="19" width="4" height="4"/>
    <rect x="22" y="24" width="4" height="4"/>
  </g>
</svg>
